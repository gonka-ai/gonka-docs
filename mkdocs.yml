site_name: ""
site_url: https://gonka.ai/
edit_uri: ""
site_description: >-
  Learn to configure and use Gonka network

# Content
nav:
  - Home: index.md

  - Learn:
    - Introduction: introduction.md
    - Architecture: architecture.md
    - Glossary: glossary.md

  - Developer:
    - Quickstart: developer/quickstart.md

  - Host:
    - Get started:
      - Quickstart: host/quickstart.md
      - Hardware specifications: host/hardware-specifications.md
      - Key management: host/key-management.md
      - Collateral: host/collateral.md
      - Genesis: host/genesis.md
    - Operate:
      - ML Node management: host/mlnode-management.md
      - Validate ML Node: host/mlnode-validation.md
      - Multiple nodes: host/multiple-nodes.md
      - Edit public host info: host/host_info.md
      - Network Node API: host/network-node-api.md
    - Models & benchmarks:
      - Multi-Model PoC: host/multi_model_poc.md
      - Kimi K2.6 bootstrap: host/kimi-bootstrap.md
      - MiniMax-M2.7 bootstrap: host/minimax-bootstrap.md
      - Deployment benchmark: host/benchmark-to-choose-optimal-deployment-config-for-llms.md

  - Wallet:
    - Wallet & transfer guide: wallet/wallet-and-transfer-guide.md
    - Dashboard: wallet/dashboard.md
    - Pricing: wallet/pricing.md
    - Cross-chain transfers:
      # Ethereum bridge subsection is hidden until the bridge upgrade is
      # announced. Pages themselves stay in docs/cross-chain-transfers/ethereum-bridge/
      # and remain reachable by direct URL — only the sidebar links are hidden.
      # Uncomment as-is to republish.
      # - Ethereum bridge:
      #   - Overview: cross-chain-transfers/ethereum-bridge/overview.md
      #   - Deposit USDT (Ethereum → Gonka): cross-chain-transfers/ethereum-bridge/deposit-usdt.md
      #   - Withdraw USDT (Gonka → Ethereum): cross-chain-transfers/ethereum-bridge/withdraw-usdt.md
      #   - Deposit GNK (Gonka → Ethereum): cross-chain-transfers/ethereum-bridge/deposit-gnk.md
      #   - Register a bridge token: cross-chain-transfers/ethereum-bridge/register-token.md
      - IBC:
        - Withdraw USDT via Kava (Gonka → Ethereum): cross-chain-transfers/ibc/withdraw-usdt-via-kava.md

  - Reference:
    - Transactions & governance: transactions-and-governance.md
    - Software upgrades: software-upgrades.md
    - Model licenses: model-licenses.md
    - Dashboard maintainer memo v0.2.13: dashboard-maintainer-memo-v0.2.13.md
    - Errors: Errors.md

  - Resources:
    - Release announcements: release-announcements.md
    - FAQ: FAQ.md
    - Get help: help.md

# Visual
theme:
  name: material
  favicon: images/01-favicon.png
  logo: images/logos/gonka.svg
  custom_dir: overrides
  font:
    text: Manrope
  palette:
    # Light mode
    # media: "(prefers-color-scheme: light)"
    - scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  include_search_page: false
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.annotate
    - content.code.copy
    - navigation.indexes
    - navigation.tracking
    - search.suggest

markdown_extensions:
  - footnotes
  - admonition
  - attr_list
  - toc
  # https://facelessuser.github.io/pymdown-extensions/
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.emoji
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css
  - stylesheets/nft-landing.css

extra_javascript:
  - assets/javascripts/links.js
  - assets/javascripts/quickstart-configurator.js
  # - assets/javascripts/scroll-spy-url.js  # temporarily disabled

plugins:
  - minify:
      minify_html: false
  - redirects:
      redirect_maps:
        cross-chain-transfers/multisig_participant_guide.md: cross-chain-transfers/ethereum-bridge/multisig-signer-guide.md
  - search:
      separator: '[\\s-]+'
      lang:
        - en
        - zh
  - mkdocs-video:
      is_video: true
      video_muted: true
      video_controls: true
      css_style:
        width: "50%"
  - i18n:
      reconfigure_material: true
      docs_structure: folder
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Learn: 了解
            Introduction: 介绍
            Architecture: 架构
            Glossary: 术语表
            Developer: 开发者
            Quickstart: 快速上手
            Host: 主机
            Get started: 入门
            Hardware specifications: 硬件规格
            Key management: 密钥管理
            Collateral: 抵押
            Genesis: 创世
            Operate: 运维
            ML Node management: ML 节点管理
            Validate ML Node: 验证 ML 节点
            "Multiple nodes": 多节点
            Edit public host info: 编辑主机公开信息
            "Network Node API": 网络节点 API
            Models & benchmarks: 模型与基准测试
            Multi-Model PoC: 多模型 PoC
            Kimi K2.6 bootstrap: Kimi K2.6 引导
            Deployment benchmark: 部署基准测试
            Wallet: 钱包
            Wallet & transfer guide: 钱包与转账指南
            Dashboard: 仪表盘
            Pricing: 价格
            Cross-chain transfers: 跨链转账
            IBC: IBC
            "Withdraw USDT via Kava (Gonka → Ethereum)": "通过 Kava 提取 USDT（Gonka → 以太坊）"
            # Hidden together with the Ethereum bridge nav block above.
            # Uncomment in sync when republishing.
            # Overview: 概述
            # Ethereum bridge: 以太坊跨链桥
            # "Deposit USDT (Ethereum → Gonka)": "存入 USDT（以太坊 → Gonka）"
            # "Withdraw USDT (Gonka → Ethereum)": "提取 USDT（Gonka → 以太坊）"
            # "Deposit GNK (Gonka → Ethereum)": "存入 GNK（Gonka → 以太坊）"
            # Register a bridge token: 注册跨链桥代币
            Reference: 参考
            Transactions & governance: 交易与治理
            Software upgrades: 软件升级
            "Model licenses": 模型许可
            Dashboard maintainer memo v0.2.13: 仪表盘维护者备忘录 v0.2.13
            Errors: 错误
            Resources: 资源
            Release announcements: 发布公告
            FAQ: 常见问题
            "Get help": 获取支持

strict: true

validation:
