# Visual
theme:
  name: material
  favicon: images/01-favicon.png
  logo: images/logos/gonka.svg
  custom_dir: overrides
  font:
    text: Manrope
  palette:
    # Light mode
    # media: "(prefers-color-scheme: light)"
    - scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  include_search_page: false
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.annotate
    - content.code.copy
    - navigation.indexes
    - navigation.tracking
    - search.suggest

markdown_extensions:
  - footnotes
  - admonition
  - attr_list
  - toc
  # https://facelessuser.github.io/pymdown-extensions/
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.emoji
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css
  - stylesheets/nft-landing.css

extra_javascript:
  - assets/javascripts/links.js
  - assets/javascripts/quickstart-configurator.js
  # - assets/javascripts/scroll-spy-url.js  # temporarily disabled

plugins:
  - minify:
      minify_html: false
  - search:
      separator: '[\\s-]+'
      lang:
        - en
        - zh
  - mkdocs-video:
      is_video: true
      video_muted: true
      video_controls: true
      css_style:
        width: "50%"
  - i18n:
      reconfigure_material: true
      docs_structure: folder
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Learn: 了解
            Introduction: 介绍
            Architecture: 架构
            Glossary: 术语表
            Developer: 开发者
            Quickstart: 快速上手
            Host: 主机
            Get started: 入门
            Hardware specifications: 硬件规格
            Key management: 密钥管理
            Collateral: 抵押
            Genesis: 创世
            Operate: 运维
            ML Node management: ML 节点管理
            "Multiple nodes": 多节点
            Edit public host info: 编辑主机公开信息
            "Network Node API": 网络节点 API
            Models & benchmarks: 模型与基准测试
            Multi-Model PoC: 多模型 PoC
            Kimi K2.6 bootstrap: Kimi K2.6 引导
            Deployment benchmark: 部署基准测试
            Wallet: 钱包
            Wallet & transfer guide: 钱包与转账指南
            Dashboard: 仪表盘
            Pricing: 价格
            Cross-Chain Transfers: 跨链转账
            Ethereum-Gonka bridge overview: 以太坊-Gonka 跨链桥概述
            How to wrap USDT from Ethereum to Gonka: 如何将 USDT 从以太坊包装至 Gonka
            How to withdraw wrapped USDT back to Ethereum: 如何将包装的 USDT 提取回以太坊
            Transfer GNK from Gonka to Ethereum (WGNK) and back: 在 Gonka 与以太坊之间转移 GNK (WGNK)
            How to register a new bridge token: 如何注册新的跨链桥代币
            IBC USDT withdrawal guide: IBC USDT 提现指南
            Multisig participant guide: 多签参与者指南
            Reference: 参考
            Transactions & governance: 交易与治理
            Software upgrades: 软件升级
            "Model licenses": 模型许可
            Dashboard maintainer memo v0.2.13: 仪表盘维护者备忘录 v0.2.13
            Errors: 错误
            Resources: 资源
            Release announcements: 发布公告
